name: ✏️ Update Existing Token
description: Request changes to an existing design token while maintaining hierarchy rules
title: "[UPDATE] "
labels: ["token-request", "update"]
body:
  - type: markdown
    attributes:
      value: |
        ## Update an Existing Design Token

        Specify which token you want to update and the changes needed. Hierarchy inheritance rules are always enforced:

        - Universal tokens may only hold raw primitive values (no references)
        - System tokens may only reference `universal.*`
        - Semantic tokens may only reference `system.*`
        - Component tokens may only reference `semantic.*`

        Locate the token using the same namespace + path fields used when it was created.

        See [Token Naming Conventions](../../README.md#token-naming-conventions) for details.

  - type: dropdown
    id: namespace-level
    attributes:
      label: Namespace — Level
      description: "Hierarchy layer that contains this token."
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace-theme
    attributes:
      label: Namespace — Theme
      description: "Optional theme qualifier. Mainly used for `system` layer tokens."
      placeholder: "light, dark, high-contrast — or leave empty"
    validations:
      required: false

  - type: input
    id: namespace-domain
    attributes:
      label: Namespace — Domain
      description: "Design domain for this token."
      placeholder: "color, spacing, typography, size, duration, border, shadow — or a component name"
    validations:
      required: false

  - type: input
    id: object-path
    attributes:
      label: Object Path
      description: |
        Dot-notation group/component/element segments. Optional.
        Examples: `button`, `button.container`, `forms.input.label`
      placeholder: "button.container"
    validations:
      required: false

  - type: input
    id: base-path
    attributes:
      label: Base Path
      description: |
        Dot-notation category/concept/property segments.
        Examples: `color`, `color.background`, `space.padding`
      placeholder: "color.background"
    validations:
      required: true

  - type: input
    id: modifier-path
    attributes:
      label: Modifier Path
      description: |
        Dot-notation variant/state/scale/mode segments. Optional.
        Examples: `primary`, `primary.hover`, `solid.hover.on-light`
      placeholder: "solid.hover.on-light"
    validations:
      required: false

  - type: textarea
    id: current-value
    attributes:
      label: Current Value
      description: What is the current value? (helps verify we're updating the right token)
      placeholder: "#3B82F6 or {system.light.color.brand.primary}"
    validations:
      required: true

  - type: textarea
    id: new-value
    attributes:
      label: New Value
      description: What should the new value be? Must comply with the inheritance rules for this layer.
      placeholder: "#2563EB or {system.light.color.brand.secondary}"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Change
      description: Why does this token need to be updated?
      placeholder: "Accessibility audit found insufficient contrast ratio..."
    validations:
      required: true

  - type: dropdown
    id: breaking-change
    attributes:
      label: Is this a breaking change?
      description: Will this change significantly affect existing designs or tokens that reference this one?
      options:
        - "No - Minor adjustment"
        - "Yes - Significant visual change"
        - "Unsure - Needs review"
    validations:
      required: true

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-update Checklist
      options:
        - label: I understand this change may cascade to tokens in higher layers that reference this token
          required: true
        - label: "The new value references only tokens from the layer directly above (or is a raw value for universal)"
          required: true
        - label: I have verified there are no circular reference issues
          required: true
