name: 🗑️ Delete Token
description: Request removal of a design token from the 4-layer hierarchy
title: "[DELETE] "
labels: ["token-request", "delete"]
body:
  - type: markdown
    attributes:
      value: |
        ## Delete a Design Token

        ⚠️ **Warning**: Deleting tokens may break existing implementations and any tokens in higher layers that reference them. Before submitting:

        1. Verify there are no dependent tokens in higher layers
        2. Notify consuming teams of this change
        3. Provide a migration path (replacement token if applicable)

        Locate the token using the same namespace + path fields used when it was created.

        See [Token Naming Conventions](../../README.md#token-naming-conventions) for details.

  - type: dropdown
    id: namespace-level
    attributes:
      label: Namespace — Level
      description: "Hierarchy layer that contains this token."
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace-theme
    attributes:
      label: Namespace — Theme
      description: "Optional theme qualifier. Mainly used for `system` layer tokens."
      placeholder: "light, dark, high-contrast — or leave empty"
    validations:
      required: false

  - type: input
    id: namespace-domain
    attributes:
      label: Namespace — Domain
      description: "Design domain for this token."
      placeholder: "color, spacing, typography, size, duration, border, shadow — or a component name"
    validations:
      required: false

  - type: input
    id: object-path
    attributes:
      label: Object Path
      description: |
        Dot-notation group/component/element segments. Optional.
        Examples: `button`, `button.container`, `forms.input.label`
      placeholder: "button.container"
    validations:
      required: false

  - type: input
    id: base-path
    attributes:
      label: Base Path
      description: |
        Dot-notation category/concept/property segments.
        Examples: `color`, `color.background`, `space.padding`
      placeholder: "color.background"
    validations:
      required: true

  - type: input
    id: modifier-path
    attributes:
      label: Modifier Path
      description: |
        Dot-notation variant/state/scale/mode segments. Optional.
        Examples: `primary`, `primary.hover`, `solid.hover.on-light`
      placeholder: "solid.hover.on-light"
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Reason for Deletion
      description: Why should this token be removed?
      placeholder: "Token is obsolete and has been consolidated into a new design system v2"
    validations:
      required: true

  - type: textarea
    id: impact-analysis
    attributes:
      label: Impact Analysis
      description: What tokens or components depend on this token? Are there any higher-layer tokens that reference it?
      placeholder: |
        - Dependent tokens: semantic.color.action.primary references this token
        - Affected components: component.button.container, component.nav.item
    validations:
      required: true

  - type: input
    id: replacement
    attributes:
      label: Replacement Token (if any)
      description: What token should be used instead? Must be in the same or lower layer hierarchy.
      placeholder: "semantic.color.action.primary"

  - type: textarea
    id: migration-guide
    attributes:
      label: Migration Guide
      description: Instructions for teams to migrate away from this token
      placeholder: |
        Replace all uses of `semantic.color.deprecated.old-primary` with `semantic.color.action.primary`.
        The visual appearance is identical.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I understand this is a breaking change
          required: true
        - label: I have verified no tokens in higher layers depend on this token
          required: true
        - label: I have notified consuming teams and provided a migration path
          required: true
