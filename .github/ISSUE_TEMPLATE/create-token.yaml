name: 🎨 Create New Token
description: Request a new design token in the 4-layer hierarchy (universal → system → semantic → component)
title: "[CREATE] "
labels: ["token-request", "create"]
body:
  - type: markdown
    attributes:
      value: |
        ## Create a New Design Token

        Design tokens follow a 4-layer hierarchy with a structured naming convention.

        **Hierarchy rules:**
        - **Layer 1 — Universal**: Primitive values only. No references. (`universal.*`)
        - **Layer 2 — System**: Theme-aware tokens. References `universal.*` only. (`system.[theme].*`)
        - **Layer 3 — Semantic**: Intent-driven tokens. References `system.*` only. (`semantic.*`)
        - **Layer 4 — Component**: UI component styles. References `semantic.*` only. (`component.*`)

        **Token name anatomy:**
        ```
        --ds [.theme] [.domain] [.object-path] [.base-path] [.modifier-path]
        ```
        Example: `--ds.button.container.color.background.solid.hover.on-light`

        See [Token Naming Conventions](../../README.md#token-naming-conventions) for the full reference.

  - type: dropdown
    id: namespace-level
    attributes:
      label: Namespace — Level
      description: "Choose the hierarchy layer for this token."
      options:
        - universal
        - system
        - semantic
        - component
    validations:
      required: true

  - type: input
    id: namespace-theme
    attributes:
      label: Namespace — Theme
      description: "Optional theme qualifier. Mainly used for `system` layer tokens."
      placeholder: "light, dark, high-contrast — or leave empty"
    validations:
      required: false

  - type: input
    id: namespace-domain
    attributes:
      label: Namespace — Domain
      description: "Design domain for this token."
      placeholder: "color, spacing, typography, size, duration, border, shadow — or a component name"
    validations:
      required: false

  - type: input
    id: object-path
    attributes:
      label: Object Path
      description: |
        Dot-notation path for the group, component, and/or element segments. Optional.
        - `button` — just a component
        - `button.container` — component + element
        - `forms.input.label` — group + component + element
      placeholder: "button.container"
    validations:
      required: false

  - type: input
    id: base-path
    attributes:
      label: Base Path
      description: |
        Dot-notation path for the category, concept, and/or property segments.
        - `color` — category only
        - `color.background` — category + property
        - `space.padding` — category + property
      placeholder: "color.background"
    validations:
      required: true

  - type: input
    id: modifier-path
    attributes:
      label: Modifier Path
      description: |
        Dot-notation path for variant, state, scale, and/or mode. Optional.
        - `primary` — variant only
        - `primary.hover` — variant + state
        - `solid.hover.on-light` — variant + state + mode
      placeholder: "solid.hover.on-light"
    validations:
      required: false

  - type: textarea
    id: token-value
    attributes:
      label: Token Value
      description: |
        The value for this token. Use `{path.to.token}` syntax for references.

        **By layer:**
        - Universal: raw value only — `#3B82F6`, `1rem`, `700`
        - System: reference to universal — `{universal.color.blue.500}`
        - Semantic: reference to system — `{system.light.color.brand.primary}`
        - Component: reference to semantic — `{semantic.color.action.primary}`
      placeholder: "#3B82F6 or {semantic.color.action.primary}"
    validations:
      required: true

  - type: input
    id: token-type
    attributes:
      label: Token Type
      description: "DTCG `$type` for this token."
      placeholder: "color, dimension, fontSize, fontWeight, duration, border, shadow, opacity, …"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the purpose and intended use of this token.
      placeholder: "Primary brand color used for main CTAs and interactive elements"
    validations:
      required: true

  - type: textarea
    id: usage-examples
    attributes:
      label: Usage Examples
      description: Where and how should this token be used?
      placeholder: |
        - Primary buttons background
        - Active navigation item highlight
        - Link text color

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked that this token does not already exist in its layer
          required: true
        - label: The namespace, object, base, and modifier paths follow the naming conventions
          required: true
        - label: "The `$value` references only tokens from the layer directly above (or is a raw value for universal)"
          required: true
        - label: "The `$type` value is valid per the DTCG spec"
          required: true
