name: 🎨 Create New Token
description: Request a new design token in the 4-layer hierarchy (universal → system → semantic → component)
title: "[CREATE] "
labels: ["token-request", "create"]
body:
  - type: markdown
    attributes:
      value: |
        ## Create a New Design Token
        
        Design tokens are organized in a 4-layer hierarchy. Choose the appropriate layer for your token:
        
        **LAYER 1 - Universal**: Primitive values (colors, spacing, typography) - self-contained, no references
        **LAYER 2 - System**: Theme-aware tokens (light/dark) - references universal only
        **LAYER 3 - Semantic**: Intent-driven tokens (action, feedback) - references system only
        **LAYER 4 - Component**: UI component styles - references semantic only
        
        See [Token Hierarchy Documentation](../../README.md#4-layer-token-hierarchy) for details.

  - type: dropdown
    id: hierarchy-level
    attributes:
      label: Hierarchy Level
      description: Which layer should this token belong to?
      options:
        - Universal (Layer 1 - Primitives)
        - System (Layer 2 - Theme-aware)
        - Semantic (Layer 3 - Intent-driven)
        - Component (Layer 4 - UI Styles)
    validations:
      required: true

  - type: dropdown
    id: domain
    attributes:
      label: Domain/Category
      description: What aspect of design does this token address?
      options:
        - color
        - spacing
        - typography
        - size
        - duration
        - border
        - shadow
        - button (Component only)
        - card (Component only)
        - input (Component only)
        - other
    validations:
      required: true

  - type: dropdown
    id: theme
    attributes:
      label: Theme (System Level Only)
      description: "**System layer tokens only**: Which theme does this token apply to?"
      options:
        - light
        - dark
        - high-contrast
        - universal (no specific theme)
    validations:
      required: false

  - type: input
    id: token-name
    attributes:
      label: Token Name
      description: |
        Use kebab-case or dot notation following the naming pattern for your layer:
        - Universal: `property` (e.g., `blue`, `16`)
        - System: `concept.property` (e.g., `brand.primary`, `feedback.success`)
        - Semantic: `intent.variant` (e.g., `action.primary`, `feedback.error`)
        - Component: `component.variant.property` (e.g., `button.primary.background`)
      placeholder: "e.g., primary-blue or primary"
    validations:
      required: true

  - type: textarea
    id: token-value
    attributes:
      label: Token Value
      description: |
        The value for this token. For references, use `{path.to.token}` syntax.
        
        Examples:
        - Primitive color: `#3B82F6`
        - System reference: `{universal.color.blue}`
        - Semantic reference: `{system.light.color.brand.primary}`
        - Component reference: `{semantic.color.action.primary}`
      placeholder: "#3B82F6 or {universal.color.blue}"
    validations:
      required: true

  - type: input
    id: token-type
    attributes:
      label: Token Type
      description: DTCG token type (color, dimension, fontSize, fontWeight, duration, border, shadow, etc.)
      placeholder: "color or dimension"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the purpose and intended use of this token.
      placeholder: "Primary brand color used for main CTAs and interactive elements"
    validations:
      required: true

  - type: textarea
    id: usage-examples
    attributes:
      label: Usage Examples
      description: Where and how should this token be used?
      placeholder: |
        - Primary buttons
        - Active navigation items
        - Link text color

  - type: checkboxes
    id: confirmation
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have checked that this token does not already exist in its layer
          required: true
        - label: The token name follows the naming convention for its layer
          required: true
        - label: "(For non-universal): I am only referencing tokens from the layer directly above mine"
          required: true
        - label: The $type value is valid per DTCG spec
          required: true
